# ペルソナ × プラットフォーム別の最適投稿時間帯（Gemini採用B）
# Plannerが scheduled_at を決める時に参照
# JST 24h表記

time_table:
  P1:  # 個人/フリーランス
    x:         ["07:30", "12:30", "22:00"]
    threads:   ["12:30", "22:00"]
    instagram: ["12:00", "21:00"]
    note:      ["20:00"]

  P2:  # 中規模会社・スタッフ層
    x:         ["12:00", "18:00"]
    threads:   ["12:30", "18:30"]
    instagram: ["12:00", "18:00", "21:00"]
    note:      ["18:00"]

  P3:  # 中規模会社・経営者層
    x:         ["08:00", "17:00"]
    threads:   ["08:30"]
    note:      ["08:00", "17:00"]
    zenn:      ["09:00"]

  P4:  # 税理士事務所
    x:         ["08:00", "20:00"]
    threads:   ["08:30"]
    note:      ["08:00", "20:00"]
    zenn:      ["09:00"]

# プラットフォーム別の文字数上限（Writerが守る）
char_limits:
  x:         280       # 英数換算。日本語は実質140文字
  threads:   500
  instagram: 2200      # キャプション
  note:      null      # 上限なし、推奨1500-3000
  zenn:      null

# 媒体別の特性メモ（Writerプロンプトに展開される）
platform_traits:
  x:         "拡散重視。冒頭1行が命。短文＋強い言葉"
  threads:   "会話重視。問いかけや独白が伸びる。スレッド分割可"
  instagram: "画像必須。キャプションは長文OK、ハッシュタグ重要"
  note:      "ストーリー・思想重視。SEO効く。長文歓迎"
  zenn:      "技術・論理重視。コードや図解が映える"
