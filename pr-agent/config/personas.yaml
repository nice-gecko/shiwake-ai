# 4ペルソナの定義
# Plannerが「今日は誰向けに」を決める時の参照表

personas:
  P1:
    name: "個人/フリーランス"
    appeal_axes:
      - "時短（手入力からの解放）"
      - "格安（月980円）"
      - "スマホスキャンの手軽さ"
    forbidden_topics:
      - "大企業向け会計の難解な議論"
      - "代理店プラン価格の比較"
    tone_hint: "親しみやすく・少し疲れた共感ベース"
    best_platforms: ["x", "threads", "instagram"]

  P2:
    name: "中規模会社・スタッフ層"
    appeal_axes:
      - "スタッフインセンティブ（Amazonギフト券）"
      - "経理が稼げる仕事になる"
      - "ゲーミフィケーション"
    forbidden_topics:
      - "経営判断・税務戦略"
    tone_hint: "ワクワク・現場目線"
    best_platforms: ["instagram", "threads", "x"]

  P3:
    name: "中規模会社・経営者層"
    appeal_axes:
      - "教育コスト削減"
      - "属人化解消"
      - "自律エージェント版による工数ゼロ化"
    forbidden_topics:
      - "個人事業主向けの安さ訴求"
    tone_hint: "論理的・ROI重視"
    best_platforms: ["x", "note"]

  P4:
    name: "税理士事務所"
    appeal_axes:
      - "顧問先ごとのマスタ学習・パーソナライズ"
      - "顧問先管理の効率化"
      - "代理店プラン（ホワイトラベル的活用）"
    forbidden_topics:
      - "競合の名指し批判（業界の礼儀）"
      - "法解釈の断定（プロが見る前提）"
    tone_hint: "プロフェッショナル・敬意"
    best_platforms: ["note", "x", "zenn"]
